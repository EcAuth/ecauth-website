version: 2

updates:
  # GitHub Actions の自動更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    # 公式 actions/* を 1 PR に集約（major は個別 PR を維持）
    groups:
      actions-minor-patch:
        patterns:
          - "actions/*"
        update-types:
          - "minor"
          - "patch"
